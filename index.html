<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login | Rápido & Seguro Logística</title>

    <!-- bootstrap css -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- estilização - cores -->
    <style>
        :root {
            --lilas-escuro: #5a189a;
            --lilas-medio: #7b2cbf;
            --lilas-claro: #e0c3fc;
            --cinza-texto: #6c757d;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: linear-gradient(135deg, var(--lilas-medio), var(--lilas-escuro));
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* header */
        header {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
        }

        .navbar-brand {
            color: var(--lilas-escuro) !important;
            font-weight: 700;
        }

        .nav-link {
            color: var(--lilas-medio);
            font-weight: 500;
        }

        .nav-link.active {
            background-color: var(--lilas-medio) !important;
            color: #fff !important;
        }

        /* main */
        main {
            flex: 1;
            padding-top: 60px; 
        }

        /* card */
        .login-card {
            border-radius: 20px;
            border: none;
            background-color: #ffffff;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.25);
        }

        .brand-title {
            font-weight: 700;
            color: var(--lilas-escuro);
        }

       
        .form-control {
            border-radius: 10px;
            padding: 10px;
        }

        .btn-primary {
            background-color: var(--lilas-medio);
            border: none;
            border-radius: 10px;
            font-weight: 600;
            padding: 12px;
        }

        .btn-primary:hover {
            background-color: var(--lilas-escuro);
        }

        /* footer */
        footer {
            background: rgba(33, 37, 41, 0.85);
            backdrop-filter: blur(6px);
            color: #fff;
        }
    </style>
</head>

<body>

    <!-- header -->
    <header>
        <nav class="navbar navbar-expand-md navbar-light shadow-sm">
            <div class="container-fluid">

                <a href="#" class="navbar-brand">
                    Rápido & Seguro Logística
                </a>

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#menuNav">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="menuNav">
                    <ul class="nav nav-pills ms-auto">
                        <li class="nav-item">
                            <a href="#home" class="nav-link active">Home</a>
                        </li>
                        <li class="nav-item">
                            <a href="#perfil" class="nav-link">Perfil</a>
                        </li>
                        <li class="nav-item">
                            <a href="#sobre" class="nav-link">Sobre</a>
                        </li>
                    </ul>
                </div>

            </div>
        </nav>
    </header>

    <!-- main -->
    <main class="container d-flex justify-content-center align-items-start">
        <div class="row justify-content-center w-100">

            <div class="col-12 col-sm-8 col-md-6 col-lg-4">
                <div class="card login-card text-center p-4">

                    <h1 class="brand-title mb-1">
                        Rápido & Seguro Logística
                    </h1>

                    <p class="text-muted mb-4">
                        Sistema de Gestão de Entregas
                    </p>

                    <!-- formulário -->
                    <form class="mt-4">

                        <div class="mb-3 text-start">
                            <label for="email" class="form-label">E-mail</label>
                            <input type="email" id="email" class="form-control"
                                placeholder="exemplo@email.com" required>
                        </div>

                        <div class="mb-3 text-start">
                            <label for="senha" class="form-label">Senha</label>
                            <input type="password" id="senha" class="form-control"
                                placeholder="Digite sua senha" required>
                        </div>

                        <div class="mb-3 text-end">
                            <a href="#" class="link-secondary small">
                                Esqueci minha senha
                            </a>
                        </div>

                        <button type="submit" class="btn btn-primary w-100">
                            Entrar
                        </button>

                    </form>

                </div>
            </div>
        </div>
    </main>

    <!-- footer -->
    <footer class="py-3 mt-4">
        <div class="container text-center">
            <p class="mb-1">
                © 2026 Rápido & Seguro Logística
            </p>
            <small>
                Sistema de Gestão de Entregas • Todos os direitos reservados
            </small>
        </div>
    </footer>

    <!-- bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>

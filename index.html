<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Rápido & Seguro Logística</title>

  <!-- importação do Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>

    <!-- Container principal com alinhamento central -->
    <div class="container d-flex justify-content-center align-items-center min-vh-100">

        <!-- Card componente Bootstrap -->
        <div class="card shadow login-card p-4">

            <!-- Cabeçalho -->
            <div class="text-center mb-4">
                <h3 class="brand-title">Rápido & Seguro Logística</h3>
                <p class="brand-subtitle">Sistema de Gestão de Entregas</p>
            </div>

            <!-- Formulário de Login -->
            <form>

                <!-- Campo de E-mail -->
                <div class="mb-3">
                    <label for="email" class="form-label">E-mail</label>
                    <input 
                        type="email" 
                        class="form-control" 
                        id="email" 
                        placeholder="exemplo@email.com"
                        required
                    >
                </div>

                <!-- Campo de Senha -->
                <div class="mb-3">
                    <label for="senha" class="form-label">Senha</label>
                    <input 
                        type="password" 
                        class="form-control" 
                        id="senha" 
                        placeholder="Digite sua senha"
                        required
                    >
                </div>

                <!-- Link Esqueci minha senha -->
                <div class="mb-3 text-end">
                    <a href="#" class="text-decoration-none small">
                        Esqueci minha senha
                    </a>
                </div>
                
                <!--Link de novos cadastros-->
                <div class="mb-3 text-end">
                    <a href="#" class="text-decoration-none small">
                        Ainda não possui cadastro? Clique aqui!
                    </a>
                </div>

                <!-- Botão Entrar -->
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary">
                        Entrar
                    </button>
                </div>

            </form>
        </div>
    </div>

    <!-- Bootstrap JS  -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
